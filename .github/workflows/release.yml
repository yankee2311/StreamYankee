name: Release OBS Propio

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Update package versions
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        VERSION_NO_V=${VERSION#v}
        
        # Update root package.json
        jq --arg version "$VERSION_NO_V" '.version = $version' package.json > package.json.tmp
        mv package.json.tmp package.json
        
        # Update UI package.json
        jq --arg version "$VERSION_NO_V" '.version = $version' ui/package.json > ui/package.json.tmp
        mv ui/package.json.tmp ui/package.json
        
        # Update bridge package.json
        jq --arg version "$VERSION_NO_V" '.version = $version' bridge/package.json > bridge/package.json.tmp
        mv bridge/package.json.tmp bridge/package.json

    - name: Commit version bump
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add package.json ui/package.json bridge/package.json
        git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
        git push

    - name: Create GitHub Release
      if: github.event_name != 'release'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: OBS Propio ${{ steps.version.outputs.VERSION }}
        body: |
          ## OBS Propio ${{ steps.version.outputs.VERSION }}
          
          ### Changes
          - See [CHANGELOG.md](CHANGELOG.md) for details
          
          ### Downloads
          - **Windows**: `OBS-Propio-Setup-${{ steps.version.outputs.VERSION }}.exe`
          - **Linux**: `OBS-Propio-${{ steps.version.outputs.VERSION }}.AppImage`
          - **macOS**: `OBS-Propio-${{ steps.version.outputs.VERSION }}.dmg`
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
            artifact: obs-propio-windows
            extension: exe
          - os: ubuntu-latest
            platform: linux
            artifact: obs-propio-linux
            extension: AppImage
          - os: macos-latest
            platform: macos
            artifact: obs-propio-macos
            extension: dmg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Build Environment
      uses: ./.github/actions/setup-build
      with:
        platform: ${{ matrix.platform }}

    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Build
      run: |
        # Build Core C++
        cd core
        mkdir -p build
        cd build
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../dist -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release --parallel
        else
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../dist -G Ninja
          cmake --build . --parallel
        fi
        cmake --install . --prefix ../dist
        cd ../..

        # Build Bridge
        cd bridge
        npm install
        npm run build
        cd ..

        # Build UI
        cd ui
        npm install
        npm run build
        cd ..

    - name: Package
      run: |
        cd ui
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          npm run electron:build
        elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          npm run electron:build -- --linux AppImage deb
        else
          npm run electron:build -- --mac dmg zip
        fi
      shell: bash

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        files: |
          ui/dist/*.exe
          ui/dist/*.AppImage
          ui/dist/*.deb
          ui/dist/*.dmg
          ui/dist/*.zip
          ui/dist/*.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [build-and-release]
    runs-on: ubuntu-latest
    name: Notify Release
    
    steps:
    - name: Create Release Summary
      run: |
        echo "## 🎉 Release Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The following artifacts have been built and uploaded:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Platforms" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Windows (x64)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Linux (x64)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ macOS (x64/ARM64)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download" >> $GITHUB_STEP_SUMMARY
        echo "Visit the [Releases page](https://github.com/${{ github.repository }}/releases) to download." >> $GITHUB_STEP_SUMMARY