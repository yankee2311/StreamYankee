name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install FFmpeg
      shell: pwsh
      run: |
        $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
        Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "C:\ffmpeg"
        $ffmpegBin = "C:\ffmpeg\ffmpeg-master-latest-win64-gpl-shared\bin"
        echo $ffmpegBin >> $env:GITHUB_PATH
        echo "FFMPEG_ROOT=$ffmpegBin" >> $env:GITHUB_ENV

    - name: Install Node Dependencies
      run: |
        npm install
        cd bridge && npm install && cd ..
        cd ui && npm install && cd ..

    - name: Build Core
      shell: pwsh
      run: |
        cd core
        if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build }
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release

    - name: Build Bridge
      run: |
        cd bridge
        npm run build

    - name: Build UI
      run: |
        cd ui
        npm run build

    - name: Create Distribution
      shell: pwsh
      run: |
        $distDir = "dist"
        if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir }
        
        Copy-Item -Path "core\build\Release\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "bridge\build\Release\*.node" -Destination $distDir -ErrorAction SilentlyContinue
        Copy-Item -Path "ui\dist\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS-Propio-Windows
        path: dist/
        retention-days: 30