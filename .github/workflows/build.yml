name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install FFmpeg via vcpkg
      shell: pwsh
      run: |
        # Clone vcpkg if not exists
        if (-not (Test-Path "C:\vcpkg")) {
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
        }

        # Bootstrap vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

        # Install FFmpeg with all features
        C:\vcpkg\vcpkg install ffmpeg:x64-windows --triplet x64-windows-rel

        # Set environment variables for CMake
        $vcpkgRoot = "C:\vcpkg\installed\x64-windows-rel"
        echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "VCPKG_ROOT_DIR=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "$vcpkgRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install Root Dependencies
      run: npm install

    - name: Build Core
      shell: pwsh
      run: |
        cd core
        if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
        cd build

        # Use vcpkg toolchain for MSVC and FFmpeg
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-rel `
          -DBUILD_TESTS=OFF

        cmake --build . --config Release --parallel

    - name: Install Bridge Dependencies
      run: |
        cd bridge
        npm install --ignore-scripts
        cd ..

    - name: Build Bridge
      shell: pwsh
      run: |
        cd bridge
        npm run build

    - name: Install UI Dependencies
      run: |
        cd ui
        npm install
        cd ..

    - name: Build UI
      run: |
        cd ui
        npm run build

    - name: Create Distribution
      shell: pwsh
      run: |
        $distDir = "dist"
        if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir | Out-Null }

        Copy-Item -Path "core\build\Release\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "bridge\build\Release\*.node" -Destination $distDir -ErrorAction SilentlyContinue

        if (Test-Path "ui\dist") {
          Copy-Item -Path "ui\dist\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS-Propio-Windows
        path: dist/
        retention-days: 30
        if-no-files-found: warn