name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install FFmpeg
      shell: pwsh
      run: |
        # Download FFmpeg essentials build (MSVC compatible with .lib files)
        $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/7.0.1/ffmpeg-7.0.1-full_build.zip"
        Write-Host "Downloading FFmpeg from $ffmpegUrl"
        Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip" -UseBasicParsing
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "C:\ffmpeg" -Force
        Remove-Item "ffmpeg.zip" -Force
        
        # Find the actual extracted folder
        $ffmpegPath = Get-ChildItem "C:\ffmpeg" -Directory | Where-Object { $_.Name -like "ffmpeg*" } | Select-Object -First 1
        $ffmpegRoot = $ffmpegPath.FullName
        $ffmpegBin = "$ffmpegRoot\bin"
        $ffmpegInclude = "$ffmpegRoot\include"
        $ffmpegLib = "$ffmpegRoot\lib"
        
        Write-Host "FFmpeg Root: $ffmpegRoot"
        Write-Host "FFmpeg Bin: $ffmpegBin"
        Write-Host "FFmpeg Include: $ffmpegInclude"
        Write-Host "FFmpeg Lib: $ffmpegLib"
        
        # Copy FFmpeg locally for bridge build
        Copy-Item -Path "$ffmpegRoot\*" -Destination "ffmpeg" -Recurse -Force -ErrorAction SilentlyContinue
        
        # Set environment variables
        echo "FFMPEG_ROOT=$ffmpegRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "FFMPEG_INCLUDE_DIR=$ffmpegInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "FFMPEG_LIB_DIR=$ffmpegLib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo $ffmpegBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install Root Dependencies
      run: npm install

    - name: Build Core
      shell: pwsh
      run: |
        cd core
        if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
        cd build
        
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DFFMPEG_ROOT="$env:FFMPEG_ROOT" `
          -DFFMPEG_INCLUDE_DIR="$env:FFMPEG_INCLUDE_DIR" `
          -DBUILD_TESTS=OFF
        
        cmake --build . --config Release --parallel

    - name: Install Bridge Dependencies
      run: |
        cd bridge
        npm install --ignore-scripts
        cd ..

    - name: Build Bridge
      shell: pwsh
      run: |
        cd bridge
        npm run build

    - name: Install UI Dependencies
      run: |
        cd ui
        npm install
        cd ..

    - name: Build UI
      run: |
        cd ui
        npm run build

    - name: Create Distribution
      shell: pwsh
      run: |
        $distDir = "dist"
        if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir | Out-Null }

        Copy-Item -Path "core\build\Release\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "bridge\build\Release\*.node" -Destination $distDir -ErrorAction SilentlyContinue

        if (Test-Path "ui\dist") {
          Copy-Item -Path "ui\dist\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS-Propio-Windows
        path: dist/
        retention-days: 30
        if-no-files-found: warn