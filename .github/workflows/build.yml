name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FFMPEG_VERSION: '7.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install FFmpeg
      shell: pwsh
      run: |
        # Download Dev package (contains .lib and .h)
        $ffmpegDevUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
        Write-Host "Downloading FFmpeg from $ffmpegDevUrl"
        Invoke-WebRequest -Uri $ffmpegDevUrl -OutFile "ffmpeg.zip" -UseBasicParsing
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "C:\ffmpeg" -Force
        
        $ffmpegRoot = "C:\ffmpeg\ffmpeg-master-latest-win64-gpl-shared"
        $ffmpegBin = "$ffmpegRoot\bin"
        $ffmpegInclude = "$ffmpegRoot\include"
        $ffmpegLib = "$ffmpegRoot\lib"
        
        # Copiar ffmpeg localmente al proyecto para que binding.gyp lo encuentre
        New-Item -ItemType Directory -Path "ffmpeg" -Force | Out-Null
        Copy-Item -Path "$ffmpegRoot\*" -Destination "ffmpeg" -Recurse -Force
        
        Write-Host "FFmpeg Root: $ffmpegRoot"
        Write-Host "FFmpeg Bin: $ffmpegBin"
        Write-Host "FFmpeg Include: $ffmpegInclude"
        Write-Host "FFmpeg Lib: $ffmpegLib"
        
        echo $ffmpegBin >> $env:GITHUB_PATH
        echo "FFMPEG_ROOT=$ffmpegRoot" >> $env:GITHUB_ENV
        echo "FFMPEG_INCLUDE_DIR=$ffmpegInclude" >> $env:GITHUB_ENV
        echo "FFMPEG_LIB_DIR=$ffmpegLib" >> $env:GITHUB_ENV

    - name: Install Root Dependencies
      run: npm install

    - name: Build Core
      shell: pwsh
      run: |
        cd core
        if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
        cd build
        
        $ffmpegRoot = $env:FFMPEG_ROOT
        
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DFFMPEG_ROOT="$ffmpegRoot" `
          -DFFMPEG_INCLUDE_DIR="$ffmpegRoot\include" `
          -DBUILD_TESTS=OFF
        
        cmake --build . --config Release --parallel

    - name: Install Bridge Dependencies
      run: |
        cd bridge
        npm install --ignore-scripts
        cd ..

    - name: Build Bridge
      shell: pwsh
      run: |
        cd bridge
        
        # Set environment for node-gyp to find FFmpeg
        $ffmpegRoot = $env:FFMPEG_ROOT
        
        npm run build

    - name: Install UI Dependencies
      run: |
        cd ui
        npm install
        cd ..

    - name: Build UI
      run: |
        cd ui
        npm run build

    - name: Create Distribution
      shell: pwsh
      run: |
        $distDir = "dist"
        if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir | Out-Null }
        
        Copy-Item -Path "core\build\Release\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "bridge\build\Release\*.node" -Destination $distDir -ErrorAction SilentlyContinue
        
        if (Test-Path "ui\dist") {
          Copy-Item -Path "ui\dist\*" -Destination $distDir -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS-Propio-Windows
        path: dist/
        retention-days: 30
        if-no-files-found: warn